name: Build Standalone Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: linux-amd64
          - runner: ubuntu-24.04-arm
            target: linux-arm64
          - runner: macos-15
            target: darwin-arm64

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Sync dependencies
        run: uv sync --extra build --extra dev

      - name: Run tests
        run: uv run pytest tests

      - name: Build standalone executable
        run: uv run pyinstaller --clean pyinstaller.spec

      - name: Archive executable
        shell: bash
        run: |
          mkdir -p artifacts
          cp dist/test-analyzer artifacts/test-analyzer
          tar -C artifacts -czf dist/test-analyzer-${{ matrix.target }}.tar.gz test-analyzer

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-analyzer-${{ matrix.target }}
          path: dist/test-analyzer-${{ matrix.target }}.tar.gz
          if-no-files-found: error

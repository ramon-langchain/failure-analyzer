name: Analyze Test Failures

on:
  workflow_call:
    inputs:
      command:
        description: Command to run under failure-analyzer.
        required: true
        type: string
      working-directory:
        description: Working directory inside the caller repository.
        required: false
        default: .
        type: string
      go-version:
        description: Optional Go version. When set, the workflow installs Go and enables Go module caching.
        required: false
        default: ""
        type: string
      python-version:
        description: Python version used for the tool runtime.
        required: false
        default: "3.14"
        type: string
      model:
        description: Optional model override passed to failure-analyzer.
        required: false
        default: ""
        type: string
      instructions:
        description: Optional custom instructions appended as higher-priority system prompt overrides.
        required: false
        default: ""
        type: string
      allow-rerun:
        description: Allow the analyzer to rerun the test command or narrowed variants with short timeouts.
        required: false
        default: false
        type: boolean
      flags:
        description: Optional internal failure-analyzer flags, for example nopreserveexitcode.
        required: false
        default: ""
        type: string
    secrets:
      OPENAI_API_KEY:
        required: false
      ANTHROPIC_API_KEY:
        required: false
      GOOGLE_API_KEY:
        required: false
      GOOGLE_CLOUD_PROJECT:
        required: false
      FAILURE_ANALYZER_OPENAI_API_KEY:
        required: false
      FAILURE_ANALYZER_ANTHROPIC_API_KEY:
        required: false
      FAILURE_ANALYZER_GOOGLE_API_KEY:
        required: false
      FAILURE_ANALYZER_GOOGLE_CLOUD_PROJECT:
        required: false

jobs:
  analyze:
    runs-on: ubuntu-24.04
    outputs:
      exit-code: ${{ steps.analyze.outputs.command_exit_code }}

    steps:
      - name: Check out caller repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Set up Go
        if: ${{ inputs.go-version != '' }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}
          cache-dependency-path: ${{ inputs.working-directory }}/go.sum

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Detect GitHub Actions history access
        id: gh_access
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if command -v gh >/dev/null 2>&1 && \
             gh auth status >/dev/null 2>&1 && \
             gh api "repos/${GITHUB_REPOSITORY}/actions/runs?per_page=1" >/dev/null 2>&1; then
            echo "can_read_actions=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_read_actions=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect PR comment access
        id: pr_comment_access
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
        run: |
          if [ -n "$PR_NUMBER" ] && \
             command -v gh >/dev/null 2>&1 && \
             gh auth status >/dev/null 2>&1; then
            echo "can_comment_pr=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_comment_pr=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build invocation context
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          OUTFILE: ${{ runner.temp }}/failure-analyzer/invocation-context.md
          REPOSITORY: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EVENT_NAME: ${{ github.event_name }}
          ACTOR: ${{ github.actor }}
          TRIGGERING_ACTOR: ${{ github.triggering_actor }}
          REF: ${{ github.ref }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          JOB: ${{ github.job }}
          WORKFLOW: ${{ github.workflow }}
          WORKFLOW_REF: ${{ github.workflow_ref }}
          WORKFLOW_SHA: ${{ github.workflow_sha }}
          RUNNER_OS: ${{ runner.os }}
          RUNNER_ARCH: ${{ runner.arch }}
          COMMAND: ${{ inputs.command }}
          WORKDIR: ${{ inputs.working-directory }}
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
          CAN_READ_ACTIONS: ${{ steps.gh_access.outputs.can_read_actions }}
          CAN_COMMENT_PR: ${{ steps.pr_comment_access.outputs.can_comment_pr }}
        run: |
          mkdir -p "$(dirname "$OUTFILE")"
          python - "$OUTFILE" <<'PY'
          import json
          import os
          import subprocess
          import sys
          from pathlib import Path
          from urllib.parse import quote

          outfile = Path(sys.argv[1])

          def env(name: str) -> str:
              return os.environ.get(name, "").strip()

          def gh_json(path: str):
              result = subprocess.run(
                  ["gh", "api", path],
                  check=False,
                  capture_output=True,
                  text=True,
              )
              if result.returncode != 0:
                  return None
              try:
                  return json.loads(result.stdout)
              except json.JSONDecodeError:
                  return None

          sections: list[str] = []

          sections.append(
              "\n".join(
                  [
                      "<github_actions_runtime_context>",
                      f"- running_in_github_actions: true",
                      f"- repository: {env('REPOSITORY')}",
                      f"- workflow: {env('WORKFLOW')}",
                      f"- workflow_ref: {env('WORKFLOW_REF')}",
                      f"- workflow_sha: {env('WORKFLOW_SHA')}",
                      f"- job: {env('JOB')}",
                      f"- event_name: {env('EVENT_NAME')}",
                      f"- actor: {env('ACTOR')}",
                      f"- triggering_actor: {env('TRIGGERING_ACTOR')}",
                      f"- ref: {env('REF')}",
                      f"- ref_name: {env('REF_NAME')}",
                      f"- sha: {env('SHA')}",
                      f"- run_id: {env('RUN_ID')}",
                      f"- run_number: {env('RUN_NUMBER')}",
                      f"- run_attempt: {env('RUN_ATTEMPT')}",
                      f"- run_url: {env('RUN_URL')}",
                      f"- runner_os: {env('RUNNER_OS')}",
                      f"- runner_arch: {env('RUNNER_ARCH')}",
                      f"- working_directory: {env('WORKDIR')}",
                      f"- wrapped_command: {env('COMMAND')}",
                      f"- can_read_actions_history: {env('CAN_READ_ACTIONS') or 'false'}",
                      f"- can_comment_on_pr: {env('CAN_COMMENT_PR') or 'false'}",
                      "</github_actions_runtime_context>",
                  ]
              )
          )

          pr_number = env("PR_NUMBER")
          pr_data = None
          if pr_number:
              pr_data = gh_json(f"repos/{env('REPOSITORY')}/pulls/{pr_number}")
              if pr_data is not None:
                  user = pr_data.get("user") or {}
                  head = pr_data.get("head") or {}
                  base = pr_data.get("base") or {}
                  sections.append(
                      "\n".join(
                          [
                              "<pull_request_context>",
                              f"- number: {pr_data.get('number')}",
                              f"- title: {pr_data.get('title', '')}",
                              f"- url: {pr_data.get('html_url', '')}",
                              f"- state: {pr_data.get('state', '')}",
                              f"- draft: {pr_data.get('draft', False)}",
                              f"- submitted_by: {user.get('login', '')}",
                              f"- submitted_by_url: {user.get('html_url', '')}",
                              f"- head_ref: {head.get('ref', '')}",
                              f"- head_sha: {head.get('sha', '')}",
                              f"- base_ref: {base.get('ref', '')}",
                              f"- base_sha: {base.get('sha', '')}",
                              "</pull_request_context>",
                          ]
                      )
                  )

          if env("CAN_READ_ACTIONS").lower() == "true":
              runs = None
              if pr_data is not None:
                  head = pr_data.get("head") or {}
                  head_sha = (head.get("sha") or "").strip()
                  if head_sha:
                      runs = gh_json(
                          f"repos/{env('REPOSITORY')}/actions/runs?event=pull_request&head_sha={quote(head_sha)}&status=completed&per_page=20"
                      )
              if runs is not None:
                  current_run_id = env("RUN_ID")
                  previous_failures = [
                      run
                      for run in runs.get("workflow_runs", [])
                      if str(run.get("id", "")) != current_run_id and run.get("conclusion") in {"failure", "timed_out", "startup_failure", "action_required"}
                  ]
                  lines = [
                      "<previous_pull_request_failures>",
                      f"- count: {len(previous_failures)}",
                  ]
                  for run in previous_failures[:8]:
                      lines.append(
                          f"- run: {run.get('html_url', '')} | workflow={run.get('name', '')} | status={run.get('conclusion', '')} | head_branch={run.get('head_branch', '')} | created_at={run.get('created_at', '')}"
                      )
                  lines.append("</previous_pull_request_failures>")
                  sections.append("\n".join(lines))

          outfile.write_text("\n\n".join(section for section in sections if section.strip()) + "\n", encoding="utf-8")
          PY
          echo "FAILURE_ANALYZER_CONTEXT_FILE=$OUTFILE" >> "$GITHUB_ENV"

      - name: Run failure-analyzer
        id: analyze
        shell: bash
        env:
          FAILURE_ANALYZER_COMMAND: ${{ inputs.command }}
          FAILURE_ANALYZER_DEFER_SUMMARY: "true"
          FAILURE_ANALYZER_FLAGS: ${{ inputs.flags }}
          FAILURE_ANALYZER_MODEL: ${{ inputs.model }}
          FAILURE_ANALYZER_CUSTOM_INSTRUCTIONS: ${{ inputs.instructions }}
          FAILURE_ANALYZER_CAN_READ_ACTIONS: ${{ steps.gh_access.outputs.can_read_actions }}
          FAILURE_ANALYZER_CAN_COMMENT_PR: ${{ steps.pr_comment_access.outputs.can_comment_pr }}
          FAILURE_ANALYZER_PR_NUMBER: ${{ github.event.pull_request.number || '' }}
          FAILURE_ANALYZER_FILES_BASE: ${{ github.server_url }}/${{ github.repository }}/blob/${{ github.sha }}/
          FAILURE_ANALYZER_OUTPUT_DIR: ${{ runner.temp }}/failure-analyzer/artifacts
          FAILURE_ANALYZER_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          FAILURE_ANALYZER_OPENAI_API_KEY: ${{ secrets.FAILURE_ANALYZER_OPENAI_API_KEY }}
          FAILURE_ANALYZER_ANTHROPIC_API_KEY: ${{ secrets.FAILURE_ANALYZER_ANTHROPIC_API_KEY }}
          FAILURE_ANALYZER_GOOGLE_API_KEY: ${{ secrets.FAILURE_ANALYZER_GOOGLE_API_KEY }}
          FAILURE_ANALYZER_GOOGLE_CLOUD_PROJECT: ${{ secrets.FAILURE_ANALYZER_GOOGLE_CLOUD_PROJECT }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
        run: |
          args=()
          if [ -n "$FAILURE_ANALYZER_MODEL" ]; then
            args+=(--model "$FAILURE_ANALYZER_MODEL")
          fi
          if [ -n "$FAILURE_ANALYZER_CUSTOM_INSTRUCTIONS" ]; then
            args+=(--instructions "$FAILURE_ANALYZER_CUSTOM_INSTRUCTIONS")
          fi
          if [ "${{ inputs.allow-rerun }}" = "true" ]; then
            args+=(--allow-rerun)
          fi

          set +e
          mkdir -p "$FAILURE_ANALYZER_OUTPUT_DIR"
          uvx --python "${{ inputs.python-version }}" \
            --from "git+https://github.com/ramon-langchain/failure-analyzer.git@${{ github.workflow_sha }}" \
            failure-analyzer \
            "${args[@]}" \
            -C "${{ inputs.working-directory }}" \
            -- \
            bash -lc "$FAILURE_ANALYZER_COMMAND"
          status=$?
          echo "command_exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Check analyzer artifact directory
        id: artifact_check
        if: always()
        shell: bash
        env:
          ARTIFACT_DIR: ${{ steps.analyze.outputs.failure_analyzer_artifact_dir }}
        run: |
          if [ -n "$ARTIFACT_DIR" ] && [ -d "$ARTIFACT_DIR" ] && find "$ARTIFACT_DIR" -type f | grep -q .; then
            echo "has_files=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_files=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload analyzer artifacts
        id: upload_artifacts
        if: always() && steps.artifact_check.outputs.has_files == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: failure-analyzer-artifacts
          path: ${{ steps.analyze.outputs.failure_analyzer_artifact_dir }}
          if-no-files-found: error

      - name: Finalize report and summary
        if: always() && steps.analyze.outputs.failure_analyzer_report_path != ''
        shell: bash
        env:
          REPORT_FILE: ${{ steps.analyze.outputs.failure_analyzer_report_path }}
          PR_COMMENT_FILE: ${{ steps.analyze.outputs.failure_analyzer_pr_comment_path }}
          ARTIFACT_URL: ${{ steps.upload_artifacts.outputs.artifact-url }}
          ARTIFACT_DIR: ${{ steps.analyze.outputs.failure_analyzer_artifact_dir }}
          PYTHONPATH: ${{ github.workspace }}/src
        run: |
          python - "$REPORT_FILE" "$PR_COMMENT_FILE" "$ARTIFACT_URL" "$ARTIFACT_DIR" <<'PY'
          import pathlib
          import sys
          from failure_analyzer.github_actions import append_step_summary
          from failure_analyzer.prompting import linkify_artifact_references

          report_path = pathlib.Path(sys.argv[1])
          pr_comment_path = pathlib.Path(sys.argv[2]) if sys.argv[2] else None
          artifact_url = sys.argv[3] or None
          artifact_dir = pathlib.Path(sys.argv[4]) if sys.argv[4] else None

          report = report_path.read_text(encoding="utf-8")
          report = linkify_artifact_references(report, artifact_url, artifact_dir=artifact_dir)
          report_path.write_text(report, encoding="utf-8")

          if pr_comment_path and pr_comment_path.exists():
              comment = pr_comment_path.read_text(encoding="utf-8")
              comment = linkify_artifact_references(comment, artifact_url, artifact_dir=artifact_dir)
              pr_comment_path.write_text(comment, encoding="utf-8")

          append_step_summary(report)
          PY

      - name: Post PR comment
        if: always() && steps.pr_comment_access.outputs.can_comment_pr == 'true' && steps.analyze.outputs.failure_analyzer_pr_comment_path != ''
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
          COMMENT_FILE: ${{ steps.analyze.outputs.failure_analyzer_pr_comment_path }}
        run: |
          json_file="$RUNNER_TEMP/failure-analyzer-pr-comment.json"
          python - "$COMMENT_FILE" "$json_file" <<'PY'
          import json
          import pathlib
          import sys

          src, dst = sys.argv[1], sys.argv[2]
          body = pathlib.Path(src).read_text(encoding="utf-8")
          pathlib.Path(dst).write_text(json.dumps({"body": body}), encoding="utf-8")
          PY
          gh api \
            --method POST \
            "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
            --input "$json_file"

      - name: Preserve test exit code
        if: always()
        shell: bash
        run: |
          exit "${{ steps.analyze.outputs.command_exit_code }}"

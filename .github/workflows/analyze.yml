name: Analyze Test Failures

on:
  workflow_call:
    inputs:
      command:
        description: Command to run under failure-analyzer.
        required: true
        type: string
      working-directory:
        description: Working directory inside the caller repository.
        required: false
        default: .
        type: string
      go-version:
        description: Optional Go version. When set, the workflow installs Go and enables Go module caching.
        required: false
        default: ""
        type: string
      python-version:
        description: Python version used for the tool runtime.
        required: false
        default: "3.14"
        type: string
      model:
        description: Optional model override passed to failure-analyzer.
        required: false
        default: ""
        type: string
      flags:
        description: Optional internal failure-analyzer flags, for example nopreserveexitcode.
        required: false
        default: ""
        type: string
    secrets:
      OPENAI_API_KEY:
        required: false
      ANTHROPIC_API_KEY:
        required: false
      GOOGLE_API_KEY:
        required: false
      GOOGLE_CLOUD_PROJECT:
        required: false
      FAILURE_ANALYZER_OPENAI_API_KEY:
        required: false
      FAILURE_ANALYZER_ANTHROPIC_API_KEY:
        required: false
      FAILURE_ANALYZER_GOOGLE_API_KEY:
        required: false
      FAILURE_ANALYZER_GOOGLE_CLOUD_PROJECT:
        required: false

jobs:
  analyze:
    runs-on: ubuntu-24.04
    outputs:
      exit-code: ${{ steps.analyze.outputs.command_exit_code }}

    steps:
      - name: Check out caller repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Set up Go
        if: ${{ inputs.go-version != '' }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}
          cache-dependency-path: ${{ inputs.working-directory }}/go.sum

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Detect GitHub Actions history access
        id: gh_access
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if command -v gh >/dev/null 2>&1 && \
             gh auth status >/dev/null 2>&1 && \
             gh api "repos/${GITHUB_REPOSITORY}/actions/runs?per_page=1" >/dev/null 2>&1; then
            echo "can_read_actions=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_read_actions=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect PR comment access
        id: pr_comment_access
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
        run: |
          if [ -n "$PR_NUMBER" ] && \
             command -v gh >/dev/null 2>&1 && \
             gh auth status >/dev/null 2>&1; then
            echo "can_comment_pr=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_comment_pr=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run failure-analyzer
        id: analyze
        shell: bash
        env:
          FAILURE_ANALYZER_COMMAND: ${{ inputs.command }}
          FAILURE_ANALYZER_DEFER_SUMMARY: "true"
          FAILURE_ANALYZER_FLAGS: ${{ inputs.flags }}
          FAILURE_ANALYZER_MODEL: ${{ inputs.model }}
          FAILURE_ANALYZER_CAN_READ_ACTIONS: ${{ steps.gh_access.outputs.can_read_actions }}
          FAILURE_ANALYZER_CAN_COMMENT_PR: ${{ steps.pr_comment_access.outputs.can_comment_pr }}
          FAILURE_ANALYZER_PR_NUMBER: ${{ github.event.pull_request.number || '' }}
          FAILURE_ANALYZER_FILES_BASE: ${{ github.server_url }}/${{ github.repository }}/blob/${{ github.sha }}/
          FAILURE_ANALYZER_OUTPUT_DIR: ${{ runner.temp }}/failure-analyzer/artifacts
          FAILURE_ANALYZER_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          FAILURE_ANALYZER_OPENAI_API_KEY: ${{ secrets.FAILURE_ANALYZER_OPENAI_API_KEY }}
          FAILURE_ANALYZER_ANTHROPIC_API_KEY: ${{ secrets.FAILURE_ANALYZER_ANTHROPIC_API_KEY }}
          FAILURE_ANALYZER_GOOGLE_API_KEY: ${{ secrets.FAILURE_ANALYZER_GOOGLE_API_KEY }}
          FAILURE_ANALYZER_GOOGLE_CLOUD_PROJECT: ${{ secrets.FAILURE_ANALYZER_GOOGLE_CLOUD_PROJECT }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
        run: |
          args=()
          if [ -n "$FAILURE_ANALYZER_MODEL" ]; then
            args+=(--model "$FAILURE_ANALYZER_MODEL")
          fi

          set +e
          mkdir -p "$FAILURE_ANALYZER_OUTPUT_DIR"
          uvx --python "${{ inputs.python-version }}" \
            --from "git+https://github.com/ramon-langchain/failure-analyzer.git@${{ github.workflow_sha }}" \
            failure-analyzer \
            "${args[@]}" \
            -C "${{ inputs.working-directory }}" \
            -- \
            bash -lc "$FAILURE_ANALYZER_COMMAND"
          status=$?
          echo "command_exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Check analyzer artifact directory
        id: artifact_check
        if: always()
        shell: bash
        env:
          ARTIFACT_DIR: ${{ steps.analyze.outputs.failure_analyzer_artifact_dir }}
        run: |
          if [ -n "$ARTIFACT_DIR" ] && [ -d "$ARTIFACT_DIR" ] && find "$ARTIFACT_DIR" -type f | grep -q .; then
            echo "has_files=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_files=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload analyzer artifacts
        id: upload_artifacts
        if: always() && steps.artifact_check.outputs.has_files == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: failure-analyzer-artifacts
          path: ${{ steps.analyze.outputs.failure_analyzer_artifact_dir }}
          if-no-files-found: error

      - name: Finalize report and summary
        if: always() && steps.analyze.outputs.failure_analyzer_report_path != ''
        shell: bash
        env:
          REPORT_FILE: ${{ steps.analyze.outputs.failure_analyzer_report_path }}
          PR_COMMENT_FILE: ${{ steps.analyze.outputs.failure_analyzer_pr_comment_path }}
          ARTIFACT_URL: ${{ steps.upload_artifacts.outputs.artifact-url }}
          PYTHONPATH: ${{ github.workspace }}/src
        run: |
          python - "$REPORT_FILE" "$PR_COMMENT_FILE" "$ARTIFACT_URL" <<'PY'
          import pathlib
          import sys
          from failure_analyzer.github_actions import append_step_summary
          from failure_analyzer.prompting import linkify_artifact_references

          report_path = pathlib.Path(sys.argv[1])
          pr_comment_path = pathlib.Path(sys.argv[2]) if sys.argv[2] else None
          artifact_url = sys.argv[3] or None

          report = report_path.read_text(encoding="utf-8")
          report = linkify_artifact_references(report, artifact_url)
          report_path.write_text(report, encoding="utf-8")

          if pr_comment_path and pr_comment_path.exists():
              comment = pr_comment_path.read_text(encoding="utf-8")
              comment = linkify_artifact_references(comment, artifact_url)
              pr_comment_path.write_text(comment, encoding="utf-8")

          append_step_summary(report)
          PY

      - name: Post PR comment
        if: always() && steps.pr_comment_access.outputs.can_comment_pr == 'true' && steps.analyze.outputs.failure_analyzer_pr_comment_path != ''
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
          COMMENT_FILE: ${{ steps.analyze.outputs.failure_analyzer_pr_comment_path }}
        run: |
          json_file="$RUNNER_TEMP/failure-analyzer-pr-comment.json"
          python - "$COMMENT_FILE" "$json_file" <<'PY'
          import json
          import pathlib
          import sys

          src, dst = sys.argv[1], sys.argv[2]
          body = pathlib.Path(src).read_text(encoding="utf-8")
          pathlib.Path(dst).write_text(json.dumps({"body": body}), encoding="utf-8")
          PY
          gh api \
            --method POST \
            "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
            --input "$json_file"

      - name: Preserve test exit code
        if: always()
        shell: bash
        run: |
          exit "${{ steps.analyze.outputs.command_exit_code }}"

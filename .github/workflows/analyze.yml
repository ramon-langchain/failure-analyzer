name: Analyze Test Failures

on:
  workflow_call:
    inputs:
      command:
        description: Command to run under failure-analyzer.
        required: true
        type: string
      working-directory:
        description: Working directory inside the caller repository.
        required: false
        default: .
        type: string
      go-version:
        description: Optional Go version. When set, the workflow installs Go and enables Go module caching.
        required: false
        default: ""
        type: string
      python-version:
        description: Python version used for the tool runtime.
        required: false
        default: "3.14"
        type: string
      model:
        description: Optional model override passed to failure-analyzer.
        required: false
        default: ""
        type: string
      flags:
        description: Optional internal failure-analyzer flags, for example nopreserveexitcode.
        required: false
        default: ""
        type: string
    secrets:
      OPENAI_API_KEY:
        required: false
      ANTHROPIC_API_KEY:
        required: false
      GOOGLE_API_KEY:
        required: false
      GOOGLE_CLOUD_PROJECT:
        required: false
      FAILURE_ANALYZER_OPENAI_API_KEY:
        required: false
      FAILURE_ANALYZER_ANTHROPIC_API_KEY:
        required: false
      FAILURE_ANALYZER_GOOGLE_API_KEY:
        required: false
      FAILURE_ANALYZER_GOOGLE_CLOUD_PROJECT:
        required: false

jobs:
  analyze:
    runs-on: ubuntu-24.04
    outputs:
      exit-code: ${{ steps.analyze.outputs.command_exit_code }}

    steps:
      - name: Check out caller repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Set up Go
        if: ${{ inputs.go-version != '' }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}
          cache-dependency-path: ${{ inputs.working-directory }}/go.sum

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Detect GitHub Actions history access
        id: gh_access
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if command -v gh >/dev/null 2>&1 && \
             gh auth status >/dev/null 2>&1 && \
             gh api "repos/${GITHUB_REPOSITORY}/actions/runs?per_page=1" >/dev/null 2>&1; then
            echo "can_read_actions=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_read_actions=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run failure-analyzer
        id: analyze
        shell: bash
        env:
          FAILURE_ANALYZER_COMMAND: ${{ inputs.command }}
          FAILURE_ANALYZER_FLAGS: ${{ inputs.flags }}
          FAILURE_ANALYZER_MODEL: ${{ inputs.model }}
          FAILURE_ANALYZER_CAN_READ_ACTIONS: ${{ steps.gh_access.outputs.can_read_actions }}
          FAILURE_ANALYZER_FILES_BASE: ${{ github.server_url }}/${{ github.repository }}/blob/${{ github.sha }}/
          FAILURE_ANALYZER_OPENAI_API_KEY: ${{ secrets.FAILURE_ANALYZER_OPENAI_API_KEY }}
          FAILURE_ANALYZER_ANTHROPIC_API_KEY: ${{ secrets.FAILURE_ANALYZER_ANTHROPIC_API_KEY }}
          FAILURE_ANALYZER_GOOGLE_API_KEY: ${{ secrets.FAILURE_ANALYZER_GOOGLE_API_KEY }}
          FAILURE_ANALYZER_GOOGLE_CLOUD_PROJECT: ${{ secrets.FAILURE_ANALYZER_GOOGLE_CLOUD_PROJECT }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
        run: |
          args=()
          if [ -n "$FAILURE_ANALYZER_MODEL" ]; then
            args+=(--model "$FAILURE_ANALYZER_MODEL")
          fi

          set +e
          uvx --python "${{ inputs.python-version }}" \
            --from "git+https://github.com/ramon-langchain/failure-analyzer.git@${{ github.workflow_sha }}" \
            failure-analyzer \
            "${args[@]}" \
            -C "${{ inputs.working-directory }}" \
            -- \
            bash -lc "$FAILURE_ANALYZER_COMMAND"
          status=$?
          echo "command_exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Preserve test exit code
        if: always()
        shell: bash
        run: |
          exit "${{ steps.analyze.outputs.command_exit_code }}"
